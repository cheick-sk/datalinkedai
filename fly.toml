# fly.toml — Fly.io (3 VMs gratuites incluses)
app = "datalinkedai-poc"
primary_region = "cdg"   # Paris

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0    # scale to 0 = gratuit quand inactif

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
